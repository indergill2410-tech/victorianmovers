services:
  - type: web
    name: victorian-house-movers
    runtime: static
    buildCommand: echo "Static site ready"
    staticPublishPath: ./outputs
    autoDeployTrigger: commit
    envVars:
      - key: SKIP_INSTALL_DEPS
        value: "true"
    domains:
      - victorianhousemovers.com.au
      - www.victorianhousemovers.com.au
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
